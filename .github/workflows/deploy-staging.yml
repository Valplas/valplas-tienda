name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy-api-staging:
    name: Deploy API to Railway Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check API
        working-directory: apps/api
        run: bun run typecheck

      - name: Lint API
        working-directory: apps/api
        run: bun run lint

      - name: Run API tests
        working-directory: apps/api
        run: bun test
        env:
          NODE_ENV: test

      - name: Build API
        working-directory: apps/api
        run: bun run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway Staging
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID_STAGING }} --environment staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Run database migrations
        run: railway run --service ${{ secrets.RAILWAY_SERVICE_ID_STAGING }} --environment staging bun db:migrate
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check API
        run: |
          sleep 15
          curl -f ${{ secrets.STAGING_API_URL }}/health || exit 1

      - name: Notify API deployment status
        if: success()
        run: echo "✅ API deployed successfully to staging"

  deploy-web-staging:
    name: Deploy Web to Vercel Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy-api-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check Web
        working-directory: apps/web
        run: bun run typecheck

      - name: Lint Web
        working-directory: apps/web
        run: bun run lint

      - name: Build Web
        working-directory: apps/web
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          NEXT_PUBLIC_MP_PUBLIC_KEY: ${{ secrets.MP_PUBLIC_KEY_TEST }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: staging

      - name: Deploy to Vercel Staging
        working-directory: apps/web
        run: |
          npm install -g vercel
          vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Notify Web deployment status
        if: success()
        run: echo "✅ Web deployed successfully to staging"

  post-deploy:
    name: Post-Deployment Checks
    runs-on: ubuntu-latest
    needs: [deploy-api-staging, deploy-web-staging]

    steps:
      - name: Summary
        run: |
          echo "🎉 Staging deployment completed successfully!"
          echo "API: ${{ secrets.STAGING_API_URL }}"
          echo "Web: https://valplas-web-git-develop.vercel.app"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Staging deployment failed!"
          echo "Check the logs above for details."
