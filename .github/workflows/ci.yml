name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            **/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun typecheck

      - name: Lint
        run: bun lint

      - name: Format check
        run: bunx prettier --check "**/*.{ts,tsx,js,jsx,json,md}"

      - name: Build API
        run: bun build:api
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_SECRET: ci-test-secret-min-32-characters-long

      - name: Build Web
        run: bun build:web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

      # - name: Run tests
      #   run: bun test
      #   env:
      #     DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets in code
        run: |
          echo "🔍 Buscando posibles secrets en el código..."

          # Patrones sospechosos - excluir archivos de seguridad y patrones legítimos
          if git grep -i -E "(api_key|api-key|apikey).*=.*['\"][a-zA-Z0-9]{20,}" -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' | grep -v "scripts/check-secrets.js"; then
            echo "❌ ERROR: Posible API key encontrada en el código"
            exit 1
          fi

          # Excluir:
          # - scripts/check-secrets.js (contiene los patrones de búsqueda)
          # - req.cookies, req.headers (código que LEE tokens de requests)
          # - pattern: (definiciones de regex)
          # - process.env (variables de entorno)
          # - .env, example, dummy, test, ci- (valores de prueba)
          # - showPassword, name="password", type="password" (UI components)
          # - as string (type assertions)
          # - formData.get('password') (form data extractions)
          if git grep -i -E "(secret|password|token).*=.*['\"][^'\"]+" -- '*.ts' '*.tsx' '*.js' '*.jsx' \
              | grep -v "scripts/check-secrets.js" \
              | grep -v "req\." \
              | grep -v "pattern:" \
              | grep -v "process\.env" \
              | grep -v "SECRET}" \
              | grep -v "TOKEN}" \
              | grep -v "\.env" \
              | grep -v "example" \
              | grep -v "dummy" \
              | grep -v "test" \
              | grep -v "ci-" \
              | grep -v "showPassword" \
              | grep -v "name=" \
              | grep -v "type=" \
              | grep -v "as string" \
              | grep -v "formData.get" \
              | grep -v "placeholder=" \
              | grep -v "defaultValue=" \
              | grep -v "bcrypt\.hash" \
              | grep -v "COOKIE_NAME" \
              | grep -v "seed" \
              | grep -v "= await" \
              | grep -v "https://"; then
            echo "❌ ERROR: Posible secret/password encontrado en el código"
            exit 1
          fi

          # Verificar que no se commiteen archivos .env
          if git ls-files | grep -E "\.env$|\.env\.local$|\.env\.production$"; then
            echo "❌ ERROR: Archivos .env encontrados en el repositorio"
            exit 1
          fi

          # Verificar archivos de credenciales
          # Excluir scripts/ y docs/ de la búsqueda (archivos legítimos)
          if git ls-files | grep -v "^scripts/" | grep -v "^docs/" | grep -E "credentials\.json|secrets\.(json|yml|yaml|txt)|\.pem$|\.key$|\.p12$"; then
            echo "❌ ERROR: Archivos de credenciales encontrados en el repositorio"
            exit 1
          fi

          echo "✅ No se encontraron secrets en el código"

      - name: Check for hardcoded IPs and URLs
        run: |
          echo "🔍 Verificando IPs y URLs hardcodeadas..."

          # Excluir archivos de configuración conocidos
          if git grep -E "[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}" -- '*.ts' '*.tsx' '*.js' '*.jsx' | grep -v "localhost" | grep -v "127.0.0.1" | grep -v "0.0.0.0" | grep -v "package.json" | grep -v "\.md"; then
            echo "⚠️ WARNING: IPs hardcodeadas encontradas (revisar si son intencionales)"
          fi

          echo "✅ Verificación completada"

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: |
          echo "🔍 Auditando dependencias (gate estricto con allowlist documentado)..."
          # Gate estricto: falla ante CUALQUIER vulnerabilidad salvo el allowlist de
          # tooling build/dev documentado en scripts/audit-check.mjs. Bun no soporta
          # `--ignore` ni nested overrides, por eso el allowlist es un script. Ver NC-07.
          bun scripts/audit-check.mjs
