name: Deploy Preview

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check Web
        working-directory: apps/web
        run: bun run typecheck

      - name: Lint Web
        working-directory: apps/web
        run: bun run lint

      - name: Build frontend
        working-directory: apps/web
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          NEXT_PUBLIC_MP_PUBLIC_KEY: ${{ secrets.MP_PUBLIC_KEY_TEST }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: preview

      - name: Deploy to Vercel Preview
        id: deploy
        working-directory: apps/web
        run: |
          npm install -g vercel
          URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} 2>&1 | grep -o 'https://[^ ]*' | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v9
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = `## 🚀 Preview Deployment Ready!

            **Preview URL:** ${url}

            ✅ Revisa los cambios antes de hacer merge.

            ### Testing Checklist
            - [ ] UI/UX funciona correctamente
            - [ ] No hay errores en consola
            - [ ] Performance aceptable (Lighthouse)
            - [ ] Mobile responsive

            **Nota:** Este preview usa el API de staging (\`${{ secrets.STAGING_API_URL }}\`)
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
