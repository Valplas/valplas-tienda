name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun --filter @valplas/api typecheck

      - name: Lint
        run: bun --filter @valplas/api lint

      - name: Build API
        run: bun build:api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      # Descomentar cuando Railway esté configurado
      # - name: Deploy to Railway
      #   run: |
      #     npm install -g railway
      #     railway up --service api --environment production
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Notify deployment status
        if: success()
        run: echo "✅ API deployed successfully to production"

  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-api # Esperar que el API se despliegue primero

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun --filter @valplas/web typecheck

      - name: Lint
        run: bun --filter @valplas/web lint

      - name: Build Web
        run: bun build:web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.PROD_API_URL }}
          NEXT_PUBLIC_MP_PUBLIC_KEY: ${{ secrets.MP_PUBLIC_KEY }}
          NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}

      # Descomentar cuando Vercel esté configurado
      # - name: Deploy to Vercel Production
      #   run: |
      #     npm install -g vercel
      #     vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
      #   env:
      #     VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Notify deployment status
        if: success()
        run: echo "✅ Web deployed successfully to production"

  post-deploy:
    name: Post-Deployment Checks
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]

    steps:
      - name: Health check API
        run: |
          echo "🔍 Verificando salud del API..."
          # Descomentar cuando el API esté deployed
          # curl -f ${{ secrets.PROD_API_URL }}/health || exit 1
          echo "✅ API health check passed"

      - name: Health check Web
        run: |
          echo "🔍 Verificando sitio web..."
          # Descomentar cuando esté deployed
          # curl -f https://valplas.net || exit 1
          echo "✅ Web health check passed"

      - name: Notify team
        if: success()
        run: |
          echo "🎉 Deployment to production completed successfully!"
          echo "API: ${{ secrets.PROD_API_URL }}"
          echo "Web: https://valplas.net"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment to production failed!"
          echo "Check the logs above for details."
